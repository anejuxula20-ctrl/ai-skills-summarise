      .float{animation:float 5s ease-in-out infinite}
      .dash{stroke-dasharray:8 12;animation:dash 12s linear infinite}
      @keyframes scan{from{transform:translateX(-260px)}to{transform:translateX(1180px)}}
      @keyframes pulse{0%,100%{opacity:.35;transform:scale(.96)}50%{opacity:1;transform:scale(1.04)}}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
      @keyframes dash{to{stroke-dashoffset:-220}}
    </style>
  </defs>
  <rect width="1200" height="520" fill="url(#paper)"/>
